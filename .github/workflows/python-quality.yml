name: Python Quality

# Workflow reutilizável. Chamado pelos projetos via:
#   uses: vitahubdev/quality-workflows/.github/workflows/python-quality.yml@v1
#
# Roda: Ruff (lint + format), mypy (tipagem), Bandit (segurança), pip-audit (CVE).
# Ruff usa a config DO PROJETO (backend/pyproject.toml ou ruff.toml), auto-descoberta —
# a mesma que o pre-commit e o editor leem, garantindo local == CI. Bandit (só CI) usa
# a config CENTRAL como piso de segurança, baixada em runtime.
# Bandit exporta SARIF para a aba Security > Code scanning do projeto chamador.

on:
  workflow_call:
    inputs:
      working-directory:
        type: string
        default: '.'
        description: 'Pasta onde está o requirements.txt.'
      package-dir:
        type: string
        default: 'app'
        description: 'Pasta do código-fonte, RELATIVA À RAIZ DO REPO. Ex: backend/app'
      python-version:
        type: string
        default: '3.12'
      config-ref:
        type: string
        default: 'v1'
        description: 'Tag/branch do quality-workflows de onde baixar as configs.'
      strict-mypy:
        type: boolean
        default: false
        description: 'Se true, mypy falha o job. Comece false em código legado.'
      strict-bandit:
        type: boolean
        default: false
        description: 'Se true, Bandit falha o job. Comece false — falso positivo é comum.'

jobs:
  python:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write     # necessário para o upload-sarif
    steps:
      # Checkout 1: o código do PROJETO que está sendo verificado
      - name: Checkout do projeto
        uses: actions/checkout@v7

      # Checkout 2: a config CENTRAL do Bandit (piso de segurança, só CI), numa
      # subpasta isolada. Lint/format (Ruff, Biome) usam a config DO PROJETO;
      # só o Bandit puxa a central.
      - name: Checkout das configs centrais
        uses: actions/checkout@v7
        with:
          repository: vitahubdev/quality-workflows
          ref: ${{ inputs.config-ref }}
          path: .quality-config

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ inputs.python-version }}

      # ── Ruff: lint (config DO PROJETO, auto-descoberta) ──
      - name: Ruff lint
        uses: astral-sh/ruff-action@v4.1.0
        with:
          args: check --output-format=github ${{ inputs.package-dir }}

      # ── Ruff: format check (config DO PROJETO) ──
      - name: Ruff format check
        uses: astral-sh/ruff-action@v4.1.0
        with:
          args: format --check ${{ inputs.package-dir }}

      # ── mypy: tipagem ────────────────────────────
      - name: mypy
        continue-on-error: ${{ !inputs.strict-mypy }}
        run: pipx run mypy ${{ inputs.package-dir }} --ignore-missing-imports

      # ── Bandit: segurança → SARIF (usa config central) ──
      # Rodamos da RAIZ com escopo explícito (não `cd`), senão os paths do SARIF
      # ficam relativos à subpasta e o alerta não vira link clicável no GitHub.
      - name: Bandit
        continue-on-error: ${{ !inputs.strict-bandit }}
        run: pipx run 'bandit[sarif]' -c .quality-config/config/bandit.yaml -r ${{ inputs.package-dir }} -f sarif -o bandit.sarif

      - name: Upload Bandit SARIF
        uses: github/codeql-action/upload-sarif@v4
        if: always()          # sobe o relatório mesmo se o Bandit achou algo
        continue-on-error: true   # repo sem Advanced Security (privado/conta pessoal):
                                  # o upload falha, mas os achados ficam no log do job
        with:
          sarif_file: bandit.sarif
          category: bandit

      # ── pip-audit: CVE em dependências ───────────
      - name: pip-audit
        working-directory: ${{ inputs.working-directory }}
        continue-on-error: true   # CVE sem patch não deve travar deploy no dia 1
        run: pipx run pip-audit -r requirements.txt --desc
