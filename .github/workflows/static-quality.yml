name: Static Quality

# Workflow reutilizável para frontend vanilla (HTML/CSS/JS puro, SEM package.json).
#   uses: vitahubdev/quality-workflows/.github/workflows/static-quality.yml@v1
#
# Só Biome (config DO PROJETO) — não há dependências nem TypeScript.

on:
  workflow_call:
    inputs:
      working-directory:
        type: string
        default: 'frontend'
      node-version:
        type: string
        default: '22'
      config-ref:
        type: string
        default: 'v1'

jobs:
  static:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do projeto
        uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: ${{ inputs.node-version }}

      # Biome usa a config DO PROJETO (biome.json na raiz do projeto vanilla).
      - name: Biome
        run: npx --yes @biomejs/biome ci ${{ inputs.working-directory }}
