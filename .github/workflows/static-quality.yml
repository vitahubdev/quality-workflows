name: Static Quality

# Workflow reutilizável para frontend vanilla (HTML/CSS/JS puro, SEM package.json).
#   uses: vitahubdev/quality-workflows/.github/workflows/static-quality.yml@v1
#
# Só Biome (config central) — não há dependências nem TypeScript.

on:
  workflow_call:
    inputs:
      working-directory:
        type: string
        default: 'frontend'
      node-version:
        type: string
        default: '22'
      config-ref:
        type: string
        default: 'v1'

jobs:
  static:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do projeto
        uses: actions/checkout@v4

      - name: Checkout das configs centrais
        uses: actions/checkout@v4
        with:
          repository: vitahubdev/quality-workflows
          ref: ${{ inputs.config-ref }}
          path: .quality-config

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}

      - name: Biome
        run: npx --yes @biomejs/biome ci --config-path .quality-config/config/biome.json ${{ inputs.working-directory }}
