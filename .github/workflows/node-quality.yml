name: Node Quality

# Workflow reutilizável para frontend React/Vite (com package.json).
#   uses: vitahubdev/quality-workflows/.github/workflows/node-quality.yml@v1
#
# Roda: Biome (lint + format, config DO PROJETO), tsc (tipagem), npm audit (CVE).

on:
  workflow_call:
    inputs:
      working-directory:
        type: string
        default: 'frontend'
        description: 'Pasta com o package.json.'
      node-version:
        type: string
        default: '22'
      config-ref:
        type: string
        default: 'v1'
        description: 'Tag/branch do quality-workflows de onde baixar as configs.'
      audit-level:
        type: string
        default: 'high'
        description: 'Nível mínimo que falha o npm audit: low | moderate | high | critical.'

jobs:
  node:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do projeto
        uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: ${{ inputs.node-version }}
          cache: npm
          cache-dependency-path: ${{ inputs.working-directory }}/package-lock.json

      - name: Install
        working-directory: ${{ inputs.working-directory }}
        run: npm ci --no-audit --no-fund

      # ── Biome: lint + format (config DO PROJETO, auto-descoberta) ──
      # Monorepo: biome.json "root" na raiz + frontend/biome.json "root": false.
      - name: Biome
        run: npx --yes @biomejs/biome ci ${{ inputs.working-directory }}

      # ── TypeScript: tipagem ──────────────────────
      - name: TypeScript
        working-directory: ${{ inputs.working-directory }}
        run: npx tsc --noEmit

      # ── npm audit: CVE em dependências ───────────
      - name: npm audit
        working-directory: ${{ inputs.working-directory }}
        continue-on-error: true
        run: npm audit --audit-level=${{ inputs.audit-level }}
