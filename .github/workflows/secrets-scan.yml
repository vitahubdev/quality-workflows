name: Secrets Scan

# Workflow reutilizável de detecção de segredos.
#   uses: vitahubdev/quality-workflows/.github/workflows/secrets-scan.yml@v1
#
# Sem filtro de path: varre o repositório INTEIRO e todo o histórico do Git.
# É a verificação mais importante — segredo vazado é o único risco irreversível.
#
# Usa a CLI do gitleaks (MIT, sem licença) — a gitleaks-ACTION passou a exigir
# licença paga para ORGANIZAÇÕES. A CLI é o mesmo binário do pre-commit, então
# local e CI batem. Varre todo o histórico (fetch-depth: 0) e FALHA o job se achar
# segredo (--exit-code 1) — o gate continua valendo. Config central de segurança
# (allowlists) baixada em runtime.

on:
  workflow_call:
    inputs:
      config-ref:
        type: string
        default: 'v1'

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do projeto
        uses: actions/checkout@v7
        with:
          fetch-depth: 0      # histórico completo, não só o último commit

      - name: Checkout das configs centrais
        uses: actions/checkout@v7
        with:
          repository: vitahubdev/quality-workflows
          ref: ${{ inputs.config-ref }}
          path: .quality-config

      - name: Gitleaks
        run: |
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.21.0/gitleaks_8.21.0_linux_x64.tar.gz -o gitleaks.tar.gz
          tar -xzf gitleaks.tar.gz gitleaks
          ./gitleaks detect --source . --config .quality-config/config/gitleaks.toml --redact --exit-code 1
