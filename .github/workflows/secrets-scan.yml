name: Secrets Scan

# Workflow reutilizável de detecção de segredos.
#   uses: alrm1909/quality-workflows/.github/workflows/secrets-scan.yml@v1
#
# Sem filtro de path: varre o repositório INTEIRO e todo o histórico do Git.
# É a verificação mais importante — segredo vazado é o único risco irreversível.
# Usa a config central (config/gitleaks.toml) com a allowlist do ecossistema.

on:
  workflow_call:
    inputs:
      config-ref:
        type: string
        default: 'v1'

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout do projeto
        uses: actions/checkout@v4
        with:
          fetch-depth: 0      # histórico completo, não só o último commit

      - name: Checkout das configs centrais
        uses: actions/checkout@v4
        with:
          repository: alrm1909/quality-workflows
          ref: ${{ inputs.config-ref }}
          path: .quality-config

      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .quality-config/config/gitleaks.toml
