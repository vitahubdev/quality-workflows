name: Secrets Scan

# Workflow reutilizável de detecção de segredos.
#   uses: vitahubdev/quality-workflows/.github/workflows/secrets-scan.yml@v1
#
# Sem filtro de path: varre o repositório INTEIRO e todo o histórico do Git.
# É a verificação mais importante — segredo vazado é o único risco irreversível.
#
# NOTA sobre conta pessoal + repo privado sem Advanced Security:
#  - a gitleaks-action NÃO exige licença para conta pessoal (só organização)
#  - o upload de SARIF é DESLIGADO (Advanced Security indisponível); os achados
#    ficam no "job summary" e no log do job, que são grátis
#  - a action ainda FALHA o job se achar segredo (o gate continua valendo)

on:
  workflow_call:
    inputs:
      config-ref:
        type: string
        default: 'v1'

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do projeto
        uses: actions/checkout@v4
        with:
          fetch-depth: 0      # histórico completo, não só o último commit

      - name: Checkout das configs centrais
        uses: actions/checkout@v4
        with:
          repository: vitahubdev/quality-workflows
          ref: ${{ inputs.config-ref }}
          path: .quality-config

      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .quality-config/config/gitleaks.toml
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: false   # sem Advanced Security
          GITLEAKS_ENABLE_SUMMARY: true            # achados no job summary (grátis)
